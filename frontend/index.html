<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary Meta -->
    <title>NotesMind - Private Document Intelligence</title>
    <meta name="title" content="NotesMind - Private Document Intelligence" />
    <meta name="description" content="Ask questions about any PDF. NotesMind uses hybrid RAG retrieval to answer strictly from your document - never from the internet. Built for healthcare, finance, education, and research teams that cannot share sensitive documents with public AI." />
    <meta name="keywords" content="private document AI, RAG, PDF Q&A, document intelligence, healthcare AI, legal document search, financial report analysis, private LLM, secure document chat, retrieval augmented generation" />
    <meta name="author" content="Rajat Dhiman" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://notesmind.pro" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://notesmind.pro" />
    <meta property="og:title" content="NotesMind - Private Document Intelligence" />
    <meta property="og:description" content="Hybrid RAG retrieval over your private documents. Answers grounded strictly in your files - not the internet. Built for teams that handle sensitive data." />
    <meta property="og:image" content="https://notesmind.pro/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://notesmind.pro" />
    <meta name="twitter:title" content="NotesMind - Private Document Intelligence" />
    <meta name="twitter:description" content="Hybrid RAG retrieval over your private documents. Answers grounded strictly in your files - not the internet. Built for teams that handle sensitive data." />
    <meta name="twitter:image" content="https://notesmind.pro/og-image.png" />
    <meta name="twitter:creator" content="@Rajat_dhiman01" />

    <!-- Theme color -->
    <meta name="theme-color" content="#4f46e5" />

    <!-- Structured data - tells Google exactly what this product is -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NotesMind",
      "url": "https://notesmind.pro",
      "description": "Private document intelligence platform. Upload PDFs and ask questions - answers are grounded strictly in your documents using hybrid BM25 + FAISS retrieval with cross-encoder reranking.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Rajat Dhiman",
        "url": "https://github.com/Rajat-dhiman01"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- PWA Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
  </body>
</html>
